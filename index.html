<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chomps Project</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: #02030a;
      color: #f8fbff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px clamp(16px, 4vw, 34px);
      border-bottom: 1px solid rgba(0, 213, 255, 0.22);
      background: rgba(2, 3, 10, 0.82);
      position: sticky;
      top: 0;
      z-index: 3;
    }

    .brand {
      margin: 0;
      color: #ffe45c;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1;
      letter-spacing: 0;
      text-shadow: 0 0 12px rgba(255, 228, 92, 0.9), 0 0 26px rgba(255, 65, 167, 0.48);
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid rgba(0, 229, 255, 0.78);
      border-radius: 6px;
      color: #ffffff;
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 0.08em;
      background: #071e38;
      box-shadow: 0 0 18px rgba(0, 213, 255, 0.22);
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 0.88fr) minmax(420px, 1.12fr);
      gap: clamp(16px, 3vw, 28px);
      padding: clamp(16px, 3vw, 34px);
      width: min(1500px, 100%);
      margin: 0 auto;
    }

    .readme,
    .game-panel {
      min-width: 0;
    }

    .readme {
      color: #dbf9ff;
      line-height: 1.58;
      font-size: 16px;
    }

    .readme h1,
    .readme h2 {
      letter-spacing: 0;
    }

    .readme h1 {
      margin-top: 0;
      color: #ffe45c;
      font-size: 34px;
      text-shadow: 0 0 10px rgba(255, 228, 92, 0.68);
    }

    .readme h2 {
      margin-top: 28px;
      color: #00e5ff;
      font-size: 22px;
      text-shadow: 0 0 8px rgba(0, 213, 255, 0.52);
    }

    .readme a {
      color: #ff74c8;
    }

    .readme code {
      color: #fff2a3;
      background: rgba(255, 228, 92, 0.1);
      padding: 2px 5px;
      border-radius: 4px;
    }

    .readme pre {
      overflow: auto;
      padding: 13px 14px;
      border: 1px solid rgba(0, 213, 255, 0.22);
      border-radius: 8px;
      background: #050814;
    }

    .readme pre code {
      padding: 0;
      background: transparent;
    }

    .readme ul {
      padding-left: 22px;
    }

    .game-panel {
      position: sticky;
      top: 86px;
      align-self: start;
    }

    .game-shell {
      overflow: hidden;
      border: 1px solid rgba(0, 213, 255, 0.38);
      border-radius: 8px;
      background: #02030a;
      box-shadow: 0 0 28px rgba(0, 173, 255, 0.18);
      aspect-ratio: 16 / 10;
      min-height: 420px;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #02030a;
    }

    @media (max-width: 980px) {
      main {
        grid-template-columns: 1fr;
      }

      .game-panel {
        position: static;
        order: -1;
      }
    }

    @media (max-width: 560px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .game-shell {
        min-height: 340px;
        aspect-ratio: 9 / 12;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1 class="brand">CHOMPS</h1>
    <nav class="actions" aria-label="Project links">
      <a class="button" href="chomps.html">Full Window</a>
      <a class="button" href="README.md">Raw README</a>
    </nav>
  </header>

  <main>
    <article id="readme" class="readme" aria-live="polite"></article>
    <section class="game-panel" aria-label="Playable game">
      <div class="game-shell">
        <iframe src="chomps.html" title="Playable Chomps game"></iframe>
      </div>
    </section>
  </main>

  <script>
    const readme = document.getElementById("readme");

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function renderInline(value) {
      return escapeHtml(value)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    }

    function renderMarkdown(markdown) {
      const lines = markdown.split(/\r?\n/);
      const html = [];
      let inCode = false;
      let inList = false;

      for (const line of lines) {
        if (line.startsWith("```")) {
          if (inCode) {
            html.push("</code></pre>");
            inCode = false;
          } else {
            if (inList) {
              html.push("</ul>");
              inList = false;
            }
            html.push("<pre><code>");
            inCode = true;
          }
          continue;
        }

        if (inCode) {
          html.push(`${escapeHtml(line)}\n`);
          continue;
        }

        if (line.startsWith("# ")) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(`<h1>${renderInline(line.slice(2))}</h1>`);
        } else if (line.startsWith("## ")) {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(`<h2>${renderInline(line.slice(3))}</h2>`);
        } else if (line.startsWith("- ")) {
          if (!inList) {
            html.push("<ul>");
            inList = true;
          }
          html.push(`<li>${renderInline(line.slice(2))}</li>`);
        } else if (line.trim() === "") {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
        } else {
          if (inList) {
            html.push("</ul>");
            inList = false;
          }
          html.push(`<p>${renderInline(line)}</p>`);
        }
      }

      if (inCode) html.push("</code></pre>");
      if (inList) html.push("</ul>");
      return html.join("");
    }

    fetch("README.md")
      .then((response) => response.ok ? response.text() : Promise.reject(new Error("README not found")))
      .then((markdown) => {
        readme.innerHTML = renderMarkdown(markdown);
      })
      .catch(() => {
        readme.innerHTML = "<h1>Chomps</h1><p>Run this project through a local web server to render the README and embedded game.</p>";
      });
  </script>
</body>
</html>
